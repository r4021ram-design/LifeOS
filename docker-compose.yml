version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lifeos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lifeos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lifeos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/lifeos
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=super_secret_institutional_grade_lifeos_key_1234567890
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/lifeos
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/code
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
